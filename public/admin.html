<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><h1>Admin Dashboard</h1></header>
  <div class="container">
    <div class="dashboard">
      <div class="sidebar">
        <h2>Rooms</h2>
        <ul id="rooms-list"></ul>
        <h2>Create Room</h2>
        <div id="user-list"></div>
        <div class="create-room-container">
          <button id="create-room">Create Room</button>
        </div>
        <div class="logout-container">
          <button id="logout" class="logout-btn">
            <span class="logout-icon">&#10148;</span> Log out
          </button>
        </div>
      </div>
      <div class="main">
        <div id="tabs-container"></div>
        <div id="chat-area">
          <div id="messages"></div>
          <form id="message-form">
            <input id="message-input" placeholder="Message..." required />
            <button type="submit">Send</button>
          </form>
          <button id="download-chat">Download Chat History</button>
        </div>
      </div>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="chat.js"></script>
</body>
</html>
